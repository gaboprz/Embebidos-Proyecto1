# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-proyecto1"
BBFILE_PATTERN_meta-proyecto1 = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-proyecto1 = "6"

LAYERDEPENDS_meta-proyecto1 = "core"
LAYERSERIES_COMPAT_meta-proyecto1 = "kirkstone"
